# Minimal panel fixture for tests/test_panels.py and the Phase 3 Labeler smoke test.
#
# Hand-written subset of the real panels.yaml: three identity panels and one
# state panel, chosen to drive the keystone score_markers trace without
# downloading any data. Markers are the real ZFIN symbols; see test_panels.py
# for the expected score calculations.
#
# ontology_anchor ids match the muscle sub-DAG added to tests/fixtures/zfa_test.obo
# (ZFA:0000548 musculature system) so the Phase 3 smoke test can do real grounding.

muscle:
  germ_layer: mesoderm
  tissue: muscle
  lineage: skeletal muscle
  kind: identity
  cite: "panels_test fixture; see docs/reference/cell_labelling_playbook.md §7"
  ontology_anchor:
    - ZFA:0000548  # musculature system (verified in zfa_test.obo)
  markers: [mylpfa, acta1b, tnnt3a, myod1, myog]
  subpanels:
    myoblast: [myod1, myog]
    fast: [mylpfa, tnnt3a]

blood_erythroid:
  germ_layer: mesoderm
  tissue: blood
  lineage: erythroid
  kind: identity
  cite: "panels_test fixture; see docs/reference/cell_labelling_playbook.md §7"
  markers: [gata1a, hbae1.1, hbbe1.1]

endothelium:
  germ_layer: mesoderm
  tissue: vasculature
  lineage: endothelium
  kind: identity
  cite: "panels_test fixture; see docs/reference/cell_labelling_playbook.md §7"
  ontology_anchor:
    - ZFA:0005307  # endothelial cell (in zfa_test.obo)
  markers: [kdrl, fli1a, cdh5]

cycling:
  germ_layer: ""
  tissue: ""
  lineage: ""
  kind: state
  cite: "panels_test fixture; see docs/reference/cell_labelling_playbook.md §7"
  markers: [mki67, pcna, top2a]
